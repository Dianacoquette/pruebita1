<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <script src="https://kit.fontawesome.com/225617e3e7.js" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #fff5f9 50%, #ffe8f3 100%);
            min-height: 100vh;
            padding: 20px;
        }

        nav {
            background: white;
            padding: 15px 30px;
            border-radius: 12px;
            box-shadow: 0 2px 10px rgba(255, 182, 217, 0.1);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-dropdown {
            position: relative;
            display: inline-block;
        }

        .nav-dropdown-btn {
            background: none;
            border: none;
            color: #d67ba8;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .nav-dropdown-btn:hover {
            background: #fff8fc;
            color: #e89fc9;
        }

        .nav-dropdown-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .nav-dropdown-btn.active svg {
            transform: rotate(180deg);
        }

        .nav-dropdown-menu {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(255, 182, 217, 0.2);
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 1000;
            overflow: hidden;
        }

        .nav-dropdown-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .nav-dropdown-item {
            display: block;
            padding: 12px 20px;
            color: #8b5a73;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 14px;
            border-left: 3px solid transparent;
        }

        .nav-dropdown-item:hover {
            background: #fff8fc;
            border-left-color: #f4abe1;
            color: #d67ba8;
            padding-left: 24px;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            text-align: center;
        }

        .carousel {
            position: relative;
            width: 100%;
            max-width: 900px;
            height: 300px;
            margin: 0 auto 40px;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 182, 217, 0.25);
            background: white;
        }

        .carousel-track {
            display: flex;
            height: 100%;
            transition: transform 0.5s ease;
        }

        .carousel-item {
            min-width: 100%;
            height: 100%;
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(244, 171, 225, 0.8);
            border: none;
            color: white;
            font-size: 32px;
            padding: 10px 18px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            transition: background 0.3s ease;
        }

        .carousel-btn:hover {
            background: rgba(220, 141, 183, 0.9);
        }

        .prev {
            left: 15px;
        }

        .next {
            right: 15px;
        }

        .welcome-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(255, 182, 217, 0.15);
            padding: 60px 40px;
        }

        h1 {
            color: #d67ba8;
            font-size: 42px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        p {
            color: #b08599;
            font-size: 18px;
            line-height: 1.6;
        }

        .decorative-circle {
            position: fixed;
            border-radius: 50%;
            opacity: 0.1;
            pointer-events: none;
        }

        .circle-1 {
            width: 400px;
            height: 400px;
            background: #ffb6d9;
            top: -150px;
            right: -150px;
        }

        .circle-2 {
            width: 300px;
            height: 300px;
            background: #ffd4e8;
            bottom: -100px;
            left: -100px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }

            .welcome-card {
                padding: 40px 30px;
            }

            nav {
                padding: 12px 20px;
            }

            .carousel {
                height: 200px;
            }
        }
    </style>
</head>

<body>

    <div class="decorative-circle circle-1"></div>
    <div class="decorative-circle circle-2"></div>

    <nav>
        <div class="nav-dropdown">
            <button class="nav-dropdown-btn" id="dropdownBtn">
                Inicio
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M7 10l5 5 5-5z" />
                </svg>
            </button>
            <div class="nav-dropdown-menu" id="dropdownMenu">
                <!-- ✅ Apunta a la pantalla intermedia /persona -->
                <a href="/persona" class="nav-dropdown-item"> Persona Principal</a>
                <a href="/subir-imagen" class="nav-dropdown-item"> Cargar Imágenes</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="carousel">
            <button class="carousel-btn prev" onclick="moverManual(-1)">‹</button>
            <div class="carousel-track" id="carouselTrack">
                <div class="carousel-item" th:each="img : ${imagenesCarrusel}">
                    <img th:src="${img}" class="slide">
                </div>
            </div>
            <button class="carousel-btn next" onclick="moverManual(1)">›</button>
        </div>

        <div class="welcome-card">
            <div th:if="${emailUsuario}">
                <h1>Bienvenido</h1>
                <p><b th:text="${emailUsuario}"></b></p>
            </div>
            <div th:if="${emailUsuario == null}">
                <h1>Pantalla de Inicio</h1>
                <p>Bienvenido al registro de personas</p>
            </div>
        </div>
    </div>

    <script>
        // ── Dropdown ──
        const dropdownBtn = document.getElementById('dropdownBtn');
        const dropdownMenu = document.getElementById('dropdownMenu');

        dropdownBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdownBtn.classList.toggle('active');
            dropdownMenu.classList.toggle('active');
        });

        document.addEventListener('click', (e) => {
            if (!dropdownBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
                dropdownBtn.classList.remove('active');
                dropdownMenu.classList.remove('active');
            }
        });

        // ── Carousel ──
        const track = document.getElementById("carouselTrack");
        const slides = document.querySelectorAll(".carousel-item");

        let indice = 0;
        let intervalo;

        function mover() {
            indice++;
            if (indice >= slides.length) {
                indice = 0;
            }
            actualizar();
        }

        function moverManual(direccion) {
            clearInterval(intervalo);
            indice += direccion;

            if (indice < 0) {
                indice = slides.length - 1;
            }

            if (indice >= slides.length) {
                indice = 0;
            }

            actualizar();
            auto();
        }

        function actualizar() {
            track.style.transform = `translateX(-${indice * 100}%)`;
        }

        function auto() {
            intervalo = setInterval(mover, 3000);
        }

        auto();

        document.querySelector(".carousel")
            .addEventListener("mouseenter", () => clearInterval(intervalo));

        document.querySelector(".carousel")
            .addEventListener("mouseleave", auto);
    </script>
</body>

</html>
